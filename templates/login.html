<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Textora</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0D0F;--brand:#FF5C3A;--text:#F2F2F4;--muted:#A0A0B0;--border:#2E2E3A;--panel1:#141418;--panel2:#1C1C22;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
a{color:var(--brand);text-decoration:none}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none}
input{font-family:'DM Sans',sans-serif;width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:14px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--brand)}
.card{width:420px;max-width:100%;background:var(--panel1);border:1px solid var(--border);border-radius:20px;padding:40px}
.logo{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:28px}
.logo-dot{width:8px;height:8px;background:var(--brand);border-radius:50%}
.card-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;text-align:center;margin-bottom:6px}
.card-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:28px}
.guest-btn{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;color:var(--text);font-size:14px;font-weight:500;transition:all .2s;margin-bottom:6px;text-align:left;cursor:pointer}
.guest-btn:hover{border-color:var(--muted)}
.guest-icon{width:36px;height:36px;background:var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.guest-info{display:flex;flex-direction:column;gap:2px}
.guest-note{font-size:11px;color:var(--muted)}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px;font-weight:500}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.google-btn{width:100%;background:#fff;border:none;border-radius:12px;padding:13px 16px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;font-weight:600;color:#1a1a1a;transition:all .2s;margin-bottom:20px;cursor:pointer}
.google-btn:hover{background:#f5f5f5}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--muted)}
.input-wrap{position:relative}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted);pointer-events:none}
.input-wrap input{padding-left:42px}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;align-items:center}
.pw-wrap input{padding-right:42px}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer}
.remember input[type=checkbox]{width:auto;cursor:pointer;accent-color:var(--brand)}
.btn-submit{width:100%;background:var(--brand);color:#fff;border-radius:12px;padding:14px;font-size:15px;font-weight:700;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}
.btn-submit:hover:not(:disabled){background:#ff7b60}
.btn-submit:disabled{opacity:.7;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);border-radius:10px;padding:12px 14px;font-size:13px;color:#ff6b6b;margin-bottom:16px;display:none;align-items:center;gap:8px}
.success-msg{background:rgba(62,255,168,.1);border:1px solid rgba(62,255,168,.3);border-radius:10px;padding:12px 14px;font-size:13px;color:#3EFFA8;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.bottom-link{text-align:center;font-size:13px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-dot"></div>Textora</div>
  <div class="card-title">Welcome Back</div>
  <div class="card-sub">Sign in to continue editing</div>

  {% if msg == 'guest' %}
  <div class="success-msg">ℹ️ Please create an account to access your dashboard.</div>
  {% endif %}

  <div class="error-msg" id="loginError"></div>

  <form action="/guest" method="POST" style="margin-bottom:0">
    <button type="submit" class="guest-btn">
      <div class="guest-icon">👤</div>
      <div class="guest-info">
        <span>Continue as Guest</span>
        <span class="guest-note">No account needed. Limited to 3 exports. No save.</span>
      </div>
    </button>
  </form>

  <div class="divider">OR</div>

  <button class="google-btn" onclick="alert('Google OAuth coming soon. Please use email/password.')">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>

  <div class="divider">OR</div>

  <form id="loginForm" novalidate>
    <div class="field">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap pw-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password"/>
        <button type="button" class="eye-btn" onclick="togglePw()">👁</button>
      </div>
    </div>
    <div class="row">
      <label class="remember">
        <input type="checkbox" id="remember" name="remember"/>
        Remember me
      </label>
      <a href="#" style="font-size:13px">Forgot Password?</a>
    </div>
    <button type="submit" class="btn-submit" id="loginBtn">
      <div class="spinner" id="loginSpinner"></div>
      Sign In
    </button>
  </form>

  <div class="bottom-link">Don't have an account? <a href="/signup">Sign Up</a></div>
</div>

<script>
function togglePw(){
  const pw=document.getElementById('password');
  pw.type=pw.type==='password'?'text':'password';
}

document.addEventListener('DOMContentLoaded',function(){
  const form=document.getElementById('loginForm');
  const loginBtn=document.getElementById('loginBtn');
  const errorDiv=document.getElementById('loginError');
  const spinner=document.getElementById('loginSpinner');

  form.addEventListener('submit',async function(e){
    e.preventDefault();
    errorDiv.style.display='none';
    errorDiv.textContent='';

    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value.trim();

    if(!email||!password){
      errorDiv.textContent='Please enter your email and password.';
      errorDiv.style.display='flex';
      return;
    }

    loginBtn.disabled=true;
    spinner.style.display='block';
    loginBtn.lastChild.nodeValue=' Signing in…';

    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),10000));
    try{
      const resp=await Promise.race([
        fetch('/login',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({email:email,password:password}),
          credentials:'same-origin'
        }),
        timeout
      ]);
      const data=await resp.json();
      console.log('Login response:',data);
      if(data.success){
        loginBtn.lastChild.nodeValue=' Redirecting…';
        window.location.href=data.redirect;
      }else{
        errorDiv.textContent=data.error||'Login failed. Please try again.';
        errorDiv.style.display='flex';
        loginBtn.disabled=false;
        spinner.style.display='none';
        loginBtn.lastChild.nodeValue=' Sign In';
      }
    }catch(err){
      const msg=err.message==='timeout'?'Connection is slow. Please try again.':'Connection failed. Please try again.';
      errorDiv.textContent=msg;
      errorDiv.style.display='flex';
      loginBtn.disabled=false;
      spinner.style.display='none';
      loginBtn.lastChild.nodeValue=' Sign In';
    }
  });
});
</script>
</body>
</html>
